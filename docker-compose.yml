services:
  portfoliochat-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    container_name: portfoliochat-api
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
    expose:
      - "8000"          
    networks:
      - web
    volumes:
      - chroma_data:/app/data/chroma_store
      - ./logs:/app/logs          # bind-mount: logs are written directly to the host


  portfoliochat-frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-}
    container_name: portfoliochat-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - portfoliochat-api
    networks:
      - web

networks:
  web:
    external: true

volumes:
  chroma_data:
