services:
  portfoliochat-db:
    image: postgres:16-alpine
    container_name: portfoliochat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfoliochat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfoliochat}
      POSTGRES_DB: portfoliochat
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - web

  portfoliochat-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    container_name: portfoliochat-api
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://portfoliochat:${POSTGRES_PASSWORD:-portfoliochat}@portfoliochat-db:5432/portfoliochat
    expose:
      - "8000"          
    depends_on:
      - portfoliochat-db
    networks:
      - web
    volumes:
      - chroma_data:/app/data/chroma_store
      - ./logs:/app/logs

  portfoliochat-frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-}
    container_name: portfoliochat-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - portfoliochat-api
    networks:
      - web

networks:
  web:
    external: true

volumes:
  chroma_data:
  pg_data:
